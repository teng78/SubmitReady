name: submitready

services:
  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    environment:
      SUBMITREADY_DATA_DIR: /data
      SUBMITREADY_BUILTIN_RULES_DIR: /app/examples/rules
      SUBMITREADY_DATABASE_URL: sqlite:////data/submitready.db
      SUBMITREADY_ALLOW_UNTRUSTED_EXECUTION: "false"
    volumes:
      - submitready-data:/data
    expose:
      - "8000"
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    pids_limit: 128
    mem_limit: 512m
    cpus: 1.0
    restart: unless-stopped
    healthcheck:
      test: [CMD, python, -c, "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health', timeout=2)"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 10s

  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "8080:8080"
    read_only: true
    tmpfs:
      - /tmp:size=16m
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    pids_limit: 64
    mem_limit: 128m
    cpus: 0.5
    restart: unless-stopped

volumes:
  submitready-data:
