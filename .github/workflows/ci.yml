name: quality

on:
  push:
  pull_request:

permissions:
  contents: read
  packages: write

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/pyproject.toml
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e "./backend[dev]"
      - name: Ruff format
        working-directory: backend
        run: python -m ruff format --check .
      - name: Ruff lint
        working-directory: backend
        run: python -m ruff check .
      - name: Mypy
        working-directory: backend
        run: python -m mypy app
      - name: Pytest
        working-directory: backend
        run: python -m pytest -q

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
      - name: Install dependencies
        working-directory: frontend
        run: if [ -f package-lock.json ]; then npm ci; else npm install; fi
      - name: ESLint
        working-directory: frontend
        run: npm run lint
      - name: TypeScript
        working-directory: frontend
        run: npm run typecheck
      - name: Vitest
        working-directory: frontend
        run: npm test
      - name: Vite build
        working-directory: frontend
        run: npm run build

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: python scripts/security_scan.py
      - name: Generated fixture integrity
        run: |
          python scripts/generate_examples.py --clean
          python - <<'PY'
          import zipfile
          from pathlib import Path
          path = Path("examples/generated/zip-slip.zip")
          assert "../escaped.txt" in zipfile.ZipFile(path).namelist()
          PY

  docker:
    runs-on: ubuntu-latest
    needs: [backend, frontend, security]
    steps:
      - uses: actions/checkout@v6
      - run: docker compose config --quiet
      - name: Build split deployment
        run: docker compose build
      - name: Build single-image distribution
        run: docker build -t submitready:ci .
      - name: Log in to GitHub Container Registry
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Publish versioned and latest images
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/teng78/submitready:latest
            ghcr.io/teng78/submitready:${{ github.sha }}
