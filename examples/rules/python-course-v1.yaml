schema_version: 1
id: python-course-v1
name: Python Course Assignment
language: python
required_files:
  - main.py
forbidden_paths:
  - .env
  - .git/**
  - __pycache__/**
ignore_paths:
  - .venv/**
  - .pytest_cache/**
limits:
  max_file_bytes: 1048576
  max_project_bytes: 10485760
  max_depth: 5
commands:
  build: [python, -m, py_compile, main.py]
  test: [python, -m, pytest, -q]
  timeout_seconds: 15
  network_disabled: true
sensitive_scan: true
scoring:
  - id: structure
    label: Required structure
    weight: 30
  - id: quality
    label: Build and tests
    weight: 50
  - id: security
    label: Submission hygiene
    weight: 20
