<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc">
  <title id="title">SubmitReady 界面预览</title><desc id="desc">首页、上传和报告三个界面的概念预览</desc>
  <rect width="1200" height="520" fill="#f5f1e8"/><path d="M0 60h1200M0 460h1200" stroke="#d8d2c5"/>
  <g font-family="Arial,'Microsoft YaHei',sans-serif" fill="#142a43"><rect x="50" y="24" width="38" height="38" rx="5" fill="#142a43"/><text x="61" y="49" fill="white" font-weight="700">SR</text><text x="102" y="49" font-size="24" font-weight="700">SubmitReady</text>
  <text x="72" y="150" font-size="16" fill="#008d83" letter-spacing="3">COURSEWORK · PRE-FLIGHT</text><text x="72" y="225" font-size="58" font-weight="800">提交前，先把失分项找出来。</text><text x="72" y="275" font-size="22" fill="#516275">上传作业 ZIP，用课程规则检查结构、构建、测试与敏感信息。</text>
